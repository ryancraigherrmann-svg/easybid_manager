AWSTemplateFormatVersion: '2010-09-09'
Description: >
  EasyBid - Application Load Balancer with path-based routing.
  Routes /api/* and /graphql* to backend, everything else to frontend.

Parameters:
  EnvironmentName:
    Type: String
    Default: production

Resources:
  # ---------- ALB ----------
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub easybid-${EnvironmentName}-alb
      Scheme: internet-facing
      Type: application
      Subnets:
        - !ImportValue
          Fn::Sub: easybid-${EnvironmentName}-PublicSubnet1
        - !ImportValue
          Fn::Sub: easybid-${EnvironmentName}-PublicSubnet2
      SecurityGroups:
        - !ImportValue
          Fn::Sub: easybid-${EnvironmentName}-ALBSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub easybid-${EnvironmentName}-alb

  # ---------- Target Groups ----------

  # Frontend target group (nginx on port 80)
  FrontendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub easybid-${EnvironmentName}-fe-tg
      Port: 80
      Protocol: HTTP
      VpcId: !ImportValue
        Fn::Sub: easybid-${EnvironmentName}-VpcId
      TargetType: ip
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'

  # Backend target group (Express on port 4000)
  BackendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub easybid-${EnvironmentName}-be-tg
      Port: 4000
      Protocol: HTTP
      VpcId: !ImportValue
        Fn::Sub: easybid-${EnvironmentName}-VpcId
      TargetType: ip
      HealthCheckPath: /api/health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'

  # ---------- Listener + Routing Rules ----------

  # HTTP listener (port 80) — default sends to frontend
  HTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref FrontendTargetGroup

  # Rule: /api/* → Backend
  APIRoutingRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HTTPListener
      Priority: 10
      Conditions:
        - Field: path-pattern
          PathPatternConfig:
            Values:
              - /api/*
      Actions:
        - Type: forward
          TargetGroupArn: !Ref BackendTargetGroup

  # Rule: /graphql* → Backend
  GraphQLRoutingRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HTTPListener
      Priority: 20
      Conditions:
        - Field: path-pattern
          PathPatternConfig:
            Values:
              - /graphql*
      Actions:
        - Type: forward
          TargetGroupArn: !Ref BackendTargetGroup

  # ──────────────────────────────────────────────────────────────
  # Optional: HTTPS listener (uncomment after adding ACM cert)
  # ──────────────────────────────────────────────────────────────
  # HTTPSListener:
  #   Type: AWS::ElasticLoadBalancingV2::Listener
  #   Properties:
  #     LoadBalancerArn: !Ref ApplicationLoadBalancer
  #     Port: 443
  #     Protocol: HTTPS
  #     Certificates:
  #       - CertificateArn: !Ref CertificateArn  # Add as parameter
  #     DefaultAction:
  #       - Type: forward
  #         TargetGroupArn: !Ref FrontendTargetGroup
  #
  # # Redirect HTTP → HTTPS
  # HTTPRedirectListener:
  #   Type: AWS::ElasticLoadBalancingV2::Listener
  #   Properties:
  #     LoadBalancerArn: !Ref ApplicationLoadBalancer
  #     Port: 80
  #     Protocol: HTTP
  #     DefaultAction:
  #       - Type: redirect
  #         RedirectConfig:
  #           Protocol: HTTPS
  #           Port: '443'
  #           StatusCode: HTTP_301

Outputs:
  ALBDnsName:
    Description: Public URL for the application
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub easybid-${EnvironmentName}-ALBDnsName

  ALBArn:
    Value: !Ref ApplicationLoadBalancer
    Export:
      Name: !Sub easybid-${EnvironmentName}-ALBArn

  FrontendTargetGroupArn:
    Value: !Ref FrontendTargetGroup
    Export:
      Name: !Sub easybid-${EnvironmentName}-FrontendTargetGroupArn

  BackendTargetGroupArn:
    Value: !Ref BackendTargetGroup
    Export:
      Name: !Sub easybid-${EnvironmentName}-BackendTargetGroupArn
